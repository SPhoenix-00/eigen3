# Mono table: A=date, B=price (tradable, channel 0), C–S = 17 context → 18 channels, F=1
# Override data_path to your PKL/CSV.

# Fiscal-year-style episode: 364 env steps (one per data row); no separate settlement window.
# min_holding_period = 30 calendar days.  The env resolves calendar gaps via dates_ordinal
# (parsed from column A of your CSV/PKL).  No need for a denser daily calendar table.
context_window_days: 151
trading_period_days: 364
settlement_period_days: 0
validation_reserve_multiplier: 1.5
min_holding_period: 30

num_columns: 18
num_features_obs: 1
num_features_full: 9

num_investable_stocks: 1
investable_start_col: 0

max_positions: 10
inaction_penalty: 0.0
coefficient_threshold: 1.0
min_sale_target: 10.0
max_sale_target: 50.0
hurdle_rate: 0.005
conviction_scaling_power: 1.0
loss_penalty_multiplier: 1.25
episode_reward_multiplier: 1.0
observation_noise_std: 0.01

# Mono file load (see eigen3.data.load_mono_table)
mono_num_channels: 18
mono_csv_header: 0

# Point at your processed table (pickle or CSV)
data_path: Eigen3_Processed_OUTPUT.pkl
