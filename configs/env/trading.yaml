# Trading environment config (Eigen2-aligned)
# Synced with Eigen2 environment/trading_env and utils/config

# Data dimensions (Eigen2 skinny)
context_window_days: 151
num_columns: 117
num_investable_stocks: 108
investable_start_col: 9
num_features_obs: 5
num_features_full: 9

# Episode: 364 inclusive calendar days (row count follows dates in data; see TradingEnv)
trading_period_days: 364
settlement_period_days: 0
# Validation band width = ceil(multiplier * last-episode trading rows), immediately before holdout
validation_reserve_multiplier: 2.5
# Optional: override calendar span only (defaults to trading_period_days)
# episode_calendar_days: 364
# 30 calendar days (resolved via dates_ordinal array, not row count)
min_holding_period: 30
liquidation_window_days: 10
max_holding_period: 30

# Position limits
max_positions: 10
# Concatenate open-lot summary to observations (sum coefs, days since last buy, per-slot triples)
include_portfolio_in_obs: true
max_trades_per_day: 5

# Rewards and penalties (Eigen2)
inaction_penalty: 0.0
coefficient_threshold: 1.0
hurdle_rate: 0.005
conviction_scaling_power: 1.0
forced_exit_penalty_pct: 0.01
loss_penalty_multiplier: 1.25
episode_reward_multiplier: 1.0
bnh_episode_misalignment_multiplier: 2.0

# Sale target bounds
min_sale_target: 10.0
max_sale_target: 50.0

# Observation noise (Eigen2 regularization)
observation_noise_std: 0.01

# Data path (override via CLI)
data_path: data/raw/stock_data.pkl
