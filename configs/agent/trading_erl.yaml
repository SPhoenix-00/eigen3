# Trading ERL Agent Configuration
# DDPG hyperparameters, network architecture, and optimizer.
# Population/ERL sizing lives in configs/population/default.yaml.

# Workflow class
workflow_cls: eigen3.workflows.trading_workflow.TradingERLWorkflow

# DDPG hyperparameters (Eigen2-aligned)
discount: 0.99                        # Eigen2 GAMMA
tau: 0.005                            # Eigen2 TAU — soft target update rate
exploration_noise: 0.125              # Eigen2 NOISE_SCALE
noise_decay: 0.99995                  # Eigen2 NOISE_DECAY
min_noise: 0.01                       # Eigen2 MIN_NOISE
policy_noise: 0.2                     # TD3-style delayed policy updates
clip_policy_noise: 0.5
actor_update_interval: 2              # Update actor every N critic updates

# Network architecture
# Mono (env=trading_mono): scripts/train.py builds Actor/DoubleCritic from
# env.num_columns / num_features_obs / investable_*.
actor_network:
  num_stocks: 108                     # Eigen2 NUM_INVESTABLE_STOCKS
  stock_start_idx: 9                  # Eigen2 INVESTABLE_START_COL
  hidden_dims: [256, 128, 64]         # Eigen2 ACTOR_HIDDEN_DIMS
  dropout_rate: 0.2                   # Eigen2 DROPOUT_RATE
  dropout_rate_heads: 0.2             # Eigen2 DROPOUT_RATE_HEADS
  use_remat: true

critic_network:
  hidden_dims: [256, 128]             # Eigen2 CRITIC_HIDDEN_DIMS
  dropout_rate: 0.2                   # Eigen2 DROPOUT_RATE
  use_attention: false
  use_remat: true

feature_extractor:
  num_columns: 117                    # Eigen2 TOTAL_COLUMNS (skinny); override via env for mono
  cnn_filters: 32                     # Eigen2 CNN_FILTERS
  cnn_kernel_size: 3                  # Eigen2 CNN_KERNEL_SIZE
  lstm_hidden_size: 128               # Eigen2 LSTM_HIDDEN
  num_lstm_layers: 2                  # Eigen2 LSTM_LAYERS
  lstm_bidirectional: true            # Eigen2 LSTM_BIDIRECTIONAL
  dropout_2d_rate: 0.1                # Eigen2 DROPOUT_2D_RATE
  chunk_size: 64

attention_module:
  embed_dim: 256
  num_heads: 8                        # Eigen2 ATTENTION_HEADS
  dropout_rate: 0.1
  use_attention: true                 # Eigen2 USE_ATTENTION

# Optimizer (Eigen2 uses separate actor/critic LRs)
optimizer:
  name: adam
  actor_lr: 0.0001                    # Eigen2 ACTOR_LR
  critic_lr: 0.0003                   # Eigen2 CRITIC_LR
  weight_decay: 0.0005                # Eigen2 WEIGHT_DECAY
  grad_clip_norm: 1.0
  eps: 1e-8

# Loss weights
loss_weights:
  actor_loss: 1.0
  critic_loss: 1.0

# Mixed precision training
use_mixed_precision: false            # JAX handles precision automatically
