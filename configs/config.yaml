# Main Hydra configuration file for Eigen3

defaults:
  - agent: trading_erl
  - env: trading_mono
  # Off-policy sizing + single-GPU VRAM headroom (extends population/default).
  - population: offpolicy_vram_headroom
  - logging: default
  - _self_

# Random seed
seed: 42

# Device configuration (informational: scripts/train.py does not read this yet).
# JAX uses whatever backends jaxlib provides — install jax[cuda12] for GPU or
# jax[cpu] for CPU-only servers. Override with CUDA_VISIBLE_DEVICES on the host.
device: "cuda"
num_devices: 1

# Checkpoint and logging directories
checkpoint_dir: checkpoints
log_dir: logs
data_dir: data

# Experiment tracking
experiment_name: eigen3_trading
run_name: ${now:%Y-%m-%d_%H-%M-%S}

# Enable JIT compilation
enable_jit: true

# Enable multi-device training (pmap)
enable_pmap: false
pmap_axis_name: "devices"
