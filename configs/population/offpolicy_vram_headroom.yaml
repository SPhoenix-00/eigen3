# ============================================================================
# Off-policy + single-GPU VRAM headroom (~19 GiB free on an 80 GiB card)
# ============================================================================
# Extends population/default.yaml. Use:
#   python scripts/train.py population=offpolicy_vram_headroom
#
# Rationale (steps 1–5):
#   1) local_batch_size — lower gradient noise per step (fits in freed buffer VRAM).
#   2) gradient_steps_per_gen — more SGD per gen; almost no extra static VRAM.
#   3) local_training_agent_batch_size — wider loss vmap (fewer chunks); raises
#      *peak* during training — stepped 8→16, not full pop, to stay safe.
#   4) steps_per_agent — more fresh transitions per generation vs replay reuse.
#   5) local_replay_buffer_size — split storage ~22 KB/transition; 700K ≈ 15 GiB.
#
# First vmapped loss kernel peaks hard: 128×16 ~70GiB OOM; 112×14 ~53GiB alloc OOM;
# 96×12 observed ~61/80GiB steady. Do not raise batch+chunk together without profiling.
# To experiment: try 104×12 or 96×14 one knob at a time.
# ============================================================================

defaults:
  - default

# (1) Stable on 80GiB with chunk 12; 112 pushed first-loss OOM.
local_batch_size: 96

# (2) Was 24. Pure extra work per gen; no larger replay tensor.
gradient_steps_per_gen: 32

# (3) 12-wide vmap: 4 chunks for pop 48 (12+12+12+12).
local_training_agent_batch_size: 12

# (4) Was 320. ~20% more on-policy data per gen before the same gradient block.
steps_per_agent: 384

# (5) Split storage: ~22 KB/transition. 700K ≈ 14.7 GiB.
#     96×12 loss peak ~39 GiB; with MEM_FRACTION=0.95 → 76 GiB budget,
#     leaving ~17 GiB headroom.  1M was too tight (60 GiB default limit).
local_replay_buffer_size: 700000
